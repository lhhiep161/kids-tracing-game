<svg viewBox="0 0 192 192" xmlns="http://www.w3.org/2000/svg">
  <!-- Soft cream background with rounded square -->
  <rect width="192" height="192" rx="40" fill="#fff7e6"/>
  
  <!-- Playful tracing path - wavy check mark -->
  <path 
    d="M 50 100 Q 70 85 90 95 Q 110 105 120 120 Q 135 105 155 70" 
    stroke="#e74c3c" 
    stroke-width="12" 
    fill="none" 
    stroke-linecap="round" 
    stroke-linejoin="round"
  />
  
  <!-- Start dot (green) -->
  <circle cx="50" cy="100" r="7" fill="#e74c3c"/>
  
  <!-- End dot (green) -->
  <circle cx="155" cy="70" r="7" fill="#e74c3c"/>
  
  <!-- Decorative small pencil tip at end -->
  <path 
    d="M 160 65 L 168 58 L 165 62 Z" 
    fill="#e74c3c"
  />
</svg>
